services:
  web:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # Persistent paths
      DATABASE_URL: "sqlite:////app/data/smart_property.db"
      ARTIFACTS_DIR: "/app/artifacts"
    volumes:
      - ./artifacts:/app/artifacts                        
      - ./data:/app/data                                  
      - ./app/static/models:/app/app/static/models        
    restart: unless-stopped
